<!DOCTYPE html>
<html lang="ko">
<head>
<base target="_top">
<meta charset="UTF-8">
<title>lottopic(Lotto Pick)</title>
<!-- 모바일 웹앱 설정 -->
<meta name="theme-color" content="#7C3AED">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LOTTO CASINO">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- 파비콘 / 앱 아이콘 -->
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<style>
/* =========================================================
   0. 기본 변수 & 초기화
   ========================================================= */
:root{
  --color-background1:#0a0510;
  --color-background2:#160a24;
  --color-felt:#0b3d2e;
  --color-felt-dark:#062a1f;
  --color-neon-blue:#3ad4ff;
  --color-neon-pink:#ff3ad0;
  --color-glod:#ffd166;
  --color-gloddark:#c9962c;
  --color-white:#f6f2ea; /* [수정] --background2color-white -> --color-white 로 이름 통일 */
  --shadow-strong:0 10px 30px rgba(0,0,0,.55);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{
  margin:0; padding:0; width:100%; height:100%;
  background:radial-gradient(ellipse at 50% 0%, var(--color-background2) 0%, var(--color-background1) 65%);
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  color:var(--color-white);
  overflow-x:hidden;
  user-select:none;
}

/* =========================================================
   1. app 진입 애니메이션 (Casino Entrance)
   ========================================================= */
#blackout{
  position:fixed; inset:0; background:#000; z-index:9999;
  animation:dark-off 1s ease forwards; animation-delay:.15s;
  pointer-events:none;
}
@keyframes dark-off{
  0%{opacity:1;}
  100%{opacity:0; visibility:hidden;}
}

#opening-logo{
  position:fixed; inset:0; z-index:9998;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px;
  background:radial-gradient(circle at 50% 45%, rgba(255,209,102,.12), transparent 60%);
  opacity:0; transform:scale(.7);
  animation:show-logo 1s cubic-bezier(.2,.9,.3,1.2) forwards;
  animation-delay:.25s;
  pointer-events:none;
}
#opening-logo h1{
  font-size:9vw; margin:0;
  letter-spacing:6px;
  color:var(--color-glod);
  text-shadow:
    0 0 10px var(--color-glod),
    0 0 25px var(--color-neon-pink),
    0 0 45px var(--color-neon-blue);
  animation:neon-flicker 1.6s ease-in-out infinite;
}
#opening-logo span{
  font-size:3.4vw; letter-spacing:3px; color:var(--color-neon-blue);
  text-shadow:0 0 10px var(--color-neon-blue);
}
@keyframes show-logo{
  0%{opacity:0; transform:scale(.6);}
  60%{opacity:1; transform:scale(1.08);}
  100%{opacity:1; transform:scale(1); visibility:visible;}
}
@keyframes neon-flicker{
  0%,19%,21%,23%,55%,57%,100%{opacity:1;}
  20%,22%,56%{opacity:.55;}
}
/* 오프닝 logo는 잠깐 보였다가 서서히 fade-out */
#opening-logo.fade-out{
  animation:logo-out .6s ease forwards;
}
@keyframes logo-out{
  to{opacity:0; transform:scale(1.15); visibility:hidden;}
}

/* =========================================================
   2. total 레이아웃 & board 인터랙션
   ========================================================= */
#app{
  max-width:520px; margin:0 auto; padding:18px 14px 60px;
  position:relative; min-height:100vh;
}

/* background 네온 조명 은은한 점멸 (board가 살아있는 느낌) */
.neon-glow{
  position:fixed; border-radius:50%; filter:blur(60px); opacity:.35;
  pointer-events:none; z-index:0;
}
/* [수정] animation:neon-floating유 -> neon-floating (keyframes 이름과 불일치하던 오타 수정) */
#neon-glow1{width:260px; height:260px; background:var(--color-neon-pink); top:-60px; left:-60px; animation:neon-floating 7s ease-in-out infinite;}
#neon-glow2{width:320px; height:320px; background:var(--color-neon-blue); bottom:-80px; right:-80px; animation:neon-floating 9s ease-in-out infinite reverse;}
@keyframes neon-floating{
  0%,100%{opacity:.25; transform:translate(0,0);}
  50%{opacity:.5; transform:translate(15px,-10px);}
}

header{
  text-align:center; position:relative; z-index:1; margin-bottom:16px;
}
header h1{
  font-size:26px; margin:4px 0 2px; letter-spacing:2px;
  color:var(--color-glod);
  text-shadow:0 0 8px rgba(255,209,102,.7), 0 0 20px rgba(255,58,208,.35);
}
header p{
  margin:0; font-size:12px; color:#b7a9d6; letter-spacing:1px;
}

/* 상단 "6 Numbers Selected" badge */
#done-badge{
  text-align:center; margin:10px auto; max-width:260px;
  padding:8px 14px; border-radius:30px;
  background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(255,58,208,.12));
  border:1px solid rgba(255,209,102,.5);
  font-size:13px; font-weight:700; letter-spacing:1px; color:var(--color-glod);
  opacity:0; transform:translateY(-8px) scale(.9);
  transition:all .35s cubic-bezier(.2,.8,.3,1.3);
  pointer-events:none;
}
#done-badge.show{
  opacity:1; transform:translateY(0) scale(1);
  box-shadow:0 0 18px rgba(255,209,102,.55);
  animation:glow-badge 1.4s ease-in-out infinite;
}
@keyframes glow-badge{
  0%,100%{box-shadow:0 0 12px rgba(255,209,102,.45);}
  50%{box-shadow:0 0 26px rgba(255,209,102,.85);}
}

/* selec된 num 미리보기 slot */
#slot{
  display:flex; justify-content:center; gap:8px; margin:14px 0 18px;
  position:relative; z-index:1; flex-wrap:wrap;
}
.slot{
  width:38px; height:38px; border-radius:50%;
  border:2px dashed rgba(255,255,255,.25);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:rgba(255,255,255,.35);
  transition:all .3s ease; background:rgba(255,255,255,.03);
}
/* [수정] JS가 실제로 붙이는 클래스명 "filled"와 맞춤 (기존 .slot.filled 유지) */
.slot.filled{
  border:2px solid var(--color-glod);
  color:#111; background:radial-gradient(circle at 35% 30%, #fff6d8, var(--color-glod) 70%);
  box-shadow:0 0 12px rgba(255,209,102,.7);
  animation:slot-pop .35s cubic-bezier(.3,1.6,.4,1) both;
}
@keyframes slot-pop{
  0%{transform:scale(.3);}
  70%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* 카지노 felt board */
#board{
  position:relative; z-index:1;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.05), transparent 50%),
    repeating-linear-gradient(45deg, rgba(255,255,255,.015) 0 2px, transparent 2px 6px),
    linear-gradient(160deg, var(--color-felt) 0%, var(--color-felt-dark) 100%);
  border-radius:22px;
  border:1px solid rgba(255,209,102,.3);
  box-shadow:
    var(--shadow-strong),
    inset 0 0 60px rgba(0,0,0,.55),
    0 0 30px rgba(255,58,208,.08);
  padding:18px 10px 22px;
  overflow:hidden;
}
/* board 테두리 네온 라인이 천천히 흐르는 느낌 */
#board::before{
  content:''; position:absolute; inset:0; border-radius:22px; padding:1px;
  background:linear-gradient(120deg, var(--color-neon-blue), var(--color-glod), var(--color-neon-pink), var(--color-neon-blue));
  background-size:300% 300%;
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  opacity:.5; animation:line-flo 6s linear infinite;
  pointer-events:none;
}
@keyframes line-flo{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

/* num chip grid (1~45) */
#num-grid{
  display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
  position:relative; z-index:1;
}
@media(min-width:400px){
  #num-grid{grid-template-columns:repeat(6,1fr);}
}

/* =========================================================
   3. num button(chip) 기본 디자인
   ========================================================= */
.chip{
  position:relative; aspect-ratio:1/1; border-radius:50%; border:none;
  cursor:pointer; outline:none;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:800; color:#fff;
  transform:scale(1) translateY(0) rotate(0deg);
  transition:transform .18s cubic-bezier(.3,1.4,.4,1), box-shadow .2s ease, filter .2s ease;
  box-shadow:
    0 4px 0 rgba(0,0,0,.35),
    0 6px 10px rgba(0,0,0,.4),
    inset 0 2px 3px rgba(255,255,255,.25),
    inset 0 -3px 4px rgba(0,0,0,.35);
}
/* 카지노 chip 특유의 점선 테두리 패턴 (가짜 홈 느낌) */
.chip::before{
  content:''; position:absolute; inset:5%; border-radius:50%;
  border:2px dashed rgba(255,255,255,.35);
  pointer-events:none;
}
.chip::after{
  content:''; position:absolute; inset:0; border-radius:50%;
  box-shadow:0 0 0 0 rgba(255,209,102,0);
  transition:box-shadow .25s ease;
  pointer-events:none;
}

/* chip color 팔레트 (7color 순환) */
.chipcolor0{background:radial-gradient(circle at 35% 28%, #ff5f6d, #b3132a 75%);}
.chipcolor1{background:radial-gradient(circle at 35% 28%, #3a3a3a, #0c0c0c 75%);}
.chipcolor2{background:radial-gradient(circle at 35% 28%, #4fb3ff, #0d5fa8 75%);}
.chipcolor3{background:radial-gradient(circle at 35% 28%, #5fdc8c, #157a41 75%);}
.chipcolor4{background:radial-gradient(circle at 35% 28%, #c98bff, #6b21b8 75%);}
.chipcolor5{background:radial-gradient(circle at 35% 28%, #ffe066, #c99400 75%);}
.chipcolor6{background:radial-gradient(circle at 35% 28%, #ff9f4f, #c95a00 75%);}

/* Hover: 살짝 커지고 그림자/글로우 증가 (모바일은 터치이므로 데스크탑 위주) */
@media (hover:hover){
  .chip:not(.selected):not(.disabled):hover{
    transform:scale(1.05) translateY(-2px);
    box-shadow:
      0 8px 0 rgba(0,0,0,.35),
      0 14px 18px rgba(0,0,0,.45),
      inset 0 2px 3px rgba(255,255,255,.3),
      inset 0 -3px 4px rgba(0,0,0,.35),
      0 0 16px rgba(255,209,102,.45);
  }
  .chip:not(.selected):not(.disabled):hover::after{
    box-shadow:0 0 0 3px rgba(255,209,102,.35);
  }
}

/* selec(Press → Bounce → Glow → Selected) */
.chip.pressed{ transform:scale(.88) translateY(3px); }

.chip.selected{
  animation:chipbounce-glow .5s cubic-bezier(.3,1.6,.3,1) both;
  box-shadow:
    0 4px 0 rgba(0,0,0,.3),
    0 8px 16px rgba(0,0,0,.4),
    inset 0 2px 3px rgba(255,255,255,.3),
    0 0 22px 4px rgba(255,209,102,.85);
}
.chip.selected::before{
  border:3px solid var(--color-glod);
  box-shadow:0 0 10px rgba(255,209,102,.9);
}
.chip.selected .chipnum{
  text-shadow:0 0 8px #fff, 0 0 14px var(--color-glod);
}
@keyframes chipbounce-glow{
  0%{transform:scale(.85);}
  45%{transform:scale(1.18);}
  70%{transform:scale(.96);}
  100%{transform:scale(1.08);}
}

/* num off: Glow Off → Rotate -8° → Normal */
.chip.turned-off{
  animation:chipoff .4s ease both;
}
@keyframes chipoff{
  0%{transform:scale(1.08) rotate(0deg); box-shadow:0 0 22px 4px rgba(255,209,102,.85);}
  50%{transform:scale(.92) rotate(-8deg); box-shadow:0 0 0 rgba(255,209,102,0);}
  100%{transform:scale(1) rotate(0deg); box-shadow:0 4px 0 rgba(0,0,0,.35), 0 6px 10px rgba(0,0,0,.4);}
}

/* 6개 selec done - total shake effect */
#num-grid.win-shake{
  animation:boardshake .5s ease;
}
@keyframes boardshake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-3px) rotate(-.3deg);}
  40%{transform:translateX(3px) rotate(.3deg);}
  60%{transform:translateX(-2px);}
  80%{transform:translateX(2px);}
}

/* 6개 다 찼을 때 나머지 미selec chip disabled process */
.chip.disabled{
  opacity:.35; cursor:not-allowed; filter:grayscale(.4);
}

/* [수정] .chipdisabled -> .chipnum (숫자 표시용 span에 실제로 붙는 클래스명과 일치시킴) */
.chipnum{ position:relative; z-index:1; pointer-events:none; }

/* glod particle (6개 done / win 시 공통 사용) */
.particle{
  position:absolute; width:6px; height:6px; border-radius:50%;
  background:var(--color-glod); pointer-events:none;
  box-shadow:0 0 6px var(--color-glod);
  animation:particle-fly .9s ease-out forwards;
}
@keyframes particle-fly{
  0%{opacity:1; transform:translate(0,0) scale(1);}
  100%{opacity:0; transform:var(--delta) scale(.3);}
}

/* =========================================================
   4. DRAW LOTTO button
   ========================================================= */
#draw-btn-area{ text-align:center; margin:22px 0 6px; position:relative; z-index:1; }
#draw-btn{
  font-size:18px; font-weight:800; letter-spacing:2px; color:#2a1400;
  padding:16px 38px; border:none; border-radius:50px; cursor:pointer;
  background:linear-gradient(160deg,#ffe89a,var(--color-glod) 45%, var(--color-gloddark) 100%);
  box-shadow:
    0 6px 0 #8a6416,
    0 10px 20px rgba(0,0,0,.5),
    0 0 24px rgba(255,209,102,.5);
  transition:transform .12s ease, box-shadow .12s ease;
}
#draw-btn:disabled{ opacity:.45; cursor:not-allowed; filter:grayscale(.5); }
#draw-btn.is-pressed{
  transform:translateY(6px);
  box-shadow:0 0 0 #8a6416, 0 4px 10px rgba(0,0,0,.5), 0 0 30px rgba(255,209,102,.8);
}
/* [수정] animation:button회전대기 -> buttonWait (keyframes 이름과 일치시킴, 한글 섞인 이름 정리) */
#draw-btn.is-rotating{ animation:buttonWait 1s linear infinite; }
@keyframes buttonWait{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.35);}
  100%{filter:brightness(1);}
}

/* =========================================================
   5. 추첨(roulette) 애니메이션 영역
   ========================================================= */
#roulette-area{
  margin-top:22px; text-align:center; position:relative; z-index:1;
  display:none;
}
#roulette-area.show{ display:block; }
#roulette-track{
  overflow:hidden; border-radius:16px; border:1px solid rgba(255,209,102,.4);
  background:linear-gradient(180deg, rgba(0,0,0,.4), rgba(0,0,0,.15));
  padding:14px 0; position:relative;
}
#roulette-track::before,
#roulette-track::after{
  content:''; position:absolute; top:0; bottom:0; width:34px; z-index:2; pointer-events:none;
}
#roulette-track::before{ left:0; background:linear-gradient(90deg, var(--color-felt-dark), transparent); }
#roulette-track::after{ right:0; background:linear-gradient(-90deg, var(--color-felt-dark), transparent); }

#roulette-line{
  display:flex; gap:10px; width:max-content;
  animation:roulette-cloud .45s linear infinite;
}
#roulette-line.decel{ animation-duration:1.1s; animation-timing-function:ease-out; }
@keyframes roulette-cloud{
  0%{transform:translateX(0);}
  100%{transform:translateX(-320px);}
}
/* [수정] 룰렛칩 스타일 블록 안에 끼어있던 잘못된 줄바꿈("display\n:flex")과
   닫는 중괄호 앞 "blackout" 잔재 텍스트를 제거하고 정상 선언으로 정리 */
.roulettechip{
  width:46px; height:46px; min-width:46px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:16px; color:#fff;
  box-shadow:inset 0 2px 3px rgba(255,255,255,.25), 0 3px 6px rgba(0,0,0,.4);
}

/* =========================================================
   6. winnums show 영역
   ========================================================= */
#result-area{ margin-top:24px; position:relative; z-index:1; display:none; }
#result-area.show{ display:block; }
#result-area h2{
  text-align:center; font-size:15px; letter-spacing:2px; color:var(--color-neon-blue);
  text-shadow:0 0 8px rgba(58,212,255,.6);
  margin-bottom:14px;
}
#win-num-line{
  display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:18px;
}
.winchip{
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:19px; font-weight:800; color:#3a2500;
  background:radial-gradient(circle at 35% 28%, #fff3c4, var(--color-glod) 60%, var(--color-gloddark));
  box-shadow:0 0 0 rgba(255,209,102,0);
  opacity:0; transform:translateY(30px) scale(.4);
}
.winchip.show{
  animation:win-pop .55s cubic-bezier(.25,1.6,.35,1) forwards;
}
@keyframes win-pop{
  0%{opacity:0; transform:translateY(30px) scale(.4);}
  60%{opacity:1; transform:translateY(-8px) scale(1.15); box-shadow:0 0 22px rgba(255,209,102,.9);}
  100%{opacity:1; transform:translateY(0) scale(1); box-shadow:0 0 16px rgba(255,209,102,.7);}
}

/* 결과 compare 카드 */
#compare-title{ text-align:center; font-size:13px; color:#c9bfe6; margin-bottom:10px; letter-spacing:1px;}
#my-num-line{
  display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:8px;
}
.comparechip{
  width:46px; height:46px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; color:#fff;
  transition:all .4s ease;
}
.comparechip.match{
  background:radial-gradient(circle at 35% 28%, #fff3c4, var(--color-glod) 60%, var(--color-gloddark));
  color:#3a2500;
  box-shadow:0 0 16px rgba(255,209,102,.85), 0 0 4px #fff inset;
  animation:match-sparkle .6s ease;
}
.comparechip.fail{
  background:#4a4a4a; opacity:.4;
}
@keyframes match-sparkle{
  0%{transform:scale(.6);}
  60%{transform:scale(1.25);}
  100%{transform:scale(1);}
}
#hit-summary{
  text-align:center; margin-top:14px; font-size:15px; font-weight:700; color:var(--color-glod);
  text-shadow:0 0 10px rgba(255,209,102,.6);
}

/* =========================================================
   7. reset button
   ========================================================= */
#reset-btn-area{ text-align:center; margin-top:22px; position:relative; z-index:1; }
#reset-btn{
  font-size:14px; font-weight:700; letter-spacing:1px; color:var(--color-white);
  padding:10px 26px; border-radius:40px; cursor:pointer;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.35);
  transition:all .2s ease;
}
#reset-btn:hover{ background:rgba(255,255,255,.16); }
#reset-btn:active{ transform:scale(.95); }

/* chip 붕 뜨는 reset 애니메이션 (grid total에 적용) */
.chip.is-resetting{
  animation:chip-reset .7s cubic-bezier(.3,.7,.3,1) both;
}
@keyframes chip-reset{
  0%{transform:translateY(0) rotate(0deg);}
  35%{transform:translateY(-14px) rotate(10deg);}
  70%{transform:translateY(-14px) rotate(-6deg);}
  100%{transform:translateY(0) rotate(0deg);}
}

footer{
  text-align:center; margin-top:26px; font-size:11px; color:#665a86; position:relative; z-index:1;
}
</style>
</head>
<body>

<!-- ===================== 오프닝(암전+네온logo) ===================== -->
<div id="blackout"></div>
<div id="opening-logo">
  <h1>LOTTO CASINO</h1>
  <span>PREMIUM DRAW EXPERIENCE</span>
</div>

<!-- background 네온 조명 (은은하게 살아 움직임) -->
<div class="neon-glow" id="neon-glow1"></div>
<div class="neon-glow" id="neon-glow2"></div>

<div id="app">

  <header>
    <h1>🎰 LOTTO CASINO</h1>
    <p>번호 6개를 선택하고 행운을 잡아보세요</p>
  </header>

  <!-- 6개 selec done badge -->
  <div id="done-badge">✨ 6 NUMBERS SELECTED ✨</div>

  <!-- selec한 num 미리보기 slot 6칸 -->
  <div id="slot"></div>

  <!-- 카지노 felt board (num selec 영역) -->
  <div id="board">
    <div id="num-grid"></div>
  </div>

  <!-- 추첨 button -->
  <div id="draw-btn-area">
    <button id="draw-btn" disabled>🎰 DRAW LOTTO</button>
  </div>

  <!-- roulette 회전 effect 영역 -->
  <div id="roulette-area">
    <div id="roulette-track"><div id="roulette-line"></div></div>
  </div>

  <!-- winnums & 결과 compare 영역 -->
  <div id="result-area">
    <h2>🏆 당첨번호</h2>
    <div id="win-num-line"></div>

    <div id="compare-title">내가 고른 번호</div>
    <div id="my-num-line"></div>
    <div id="hit-summary"></div>
  </div>

  <!-- 다시 추첨(reset) button -->
  <div id="reset-btn-area">
    <button id="reset-btn">🔄 RESET</button>
  </div>

  <footer>Google Apps Script Demo · Lotto Casino</footer>
</div>

<script>
/* =========================================================
  total 상태(State) 변수
  [수정] JS 식별자에 하이픈(-)을 쓰면 "뺄셈"으로 해석되어
  SyntaxError가 발생하므로, 모든 하이픈 식별자를 camelCase로 변경했습니다.
========================================================= */
var selectedNumList = [];   // 사용자가 선택한 번호(최대 6개)를 담는 배열
var drawing = false;        // 추첨 애니메이션이 진행 중인지 여부 (중복 클릭 방지용)
var chipColors = ['chipcolor0','chipcolor1','chipcolor2','chipcolor3','chipcolor4','chipcolor5','chipcolor6']; // 7가지 칩 색상 클래스

/* =========================================================
  1. sound 매니저 (Web Audio API로 간단한 효과음 합성)
  - 외부 mp3 파일 없이도 카지노 느낌의 효과음을 즉석에서 만들어냅니다.
========================================================= */
var audioCtx = null;

// 사용자가 처음 화면을 터치/클릭할 때 오디오 컨텍스트를 생성합니다.
// (브라우저 정책상 사용자 상호작용 이후에만 소리 재생이 허용되기 때문)
function audioCtxReady(){
  if(!audioCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if(audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
}

// 단순 톤(삐- 소리) 하나를 재생하는 기본 함수
function playTone(freq, durationSec, wave, startVol){
  audioCtxReady();
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = wave || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = startVol || 0.15;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  var now = audioCtx.currentTime;
  gain.gain.setValueAtTime(gain.gain.value, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + durationSec);
  osc.start(now);
  osc.stop(now + durationSec);
}

var sound = {
  // 칩 선택: 짧고 경쾌한 클릭음
  chipSelect: function(){ playTone(880, 0.08, 'square', 0.12); },
  // 번호 해제: 부드러운 틱 소리
  numOff: function(){ playTone(440, 0.07, 'sine', 0.08); },
  // 버튼 Hover: 짧은 휘익 소리 (주파수를 빠르게 슬라이드)
  buttonHover: function(){
    audioCtxReady();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type='sine';
    var now = audioCtx.currentTime;
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(900, now+0.12);
    gain.gain.value=0.05;
    gain.gain.exponentialRampToValueAtTime(0.001, now+0.12);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now+0.12);
  },
  // 추첨 시작: 룰렛 스핀 느낌의 노이즈성 소리
  drawStart: function(){ playTone(200, 0.4, 'sawtooth', 0.06); },
  // 번호 등장: POP
  numShow: function(){ playTone(660, 0.12, 'triangle', 0.15); },
  // 6개 선택 완료: 동전 떨어지는 느낌 (연속 톤)
  selectDone: function(){
    sound.coin(0); sound.coin(90); sound.coin(180);
  },
  coin: function(delayMs){
    setTimeout(function(){ playTone(1200, 0.1, 'square', 0.1); }, delayMs);
  },
  // 당첨 연출: 잭팟 벨소리 (화음)
  jackpot: function(){
    [523,659,784,1046].forEach(function(freq, idx){
      setTimeout(function(){ playTone(freq, 0.5, 'sine', 0.12); }, idx*80);
    });
  },
  // Glow 효과: 은은한 shimmer
  shimmer: function(){ playTone(1500, 0.15, 'sine', 0.05); },
  // Reset: 카드 셔플 느낌 (짧은 화이트노이즈성 톤 여러개)
  reset: function(){
    [300,260,220].forEach(function(f,idx){
      setTimeout(function(){ playTone(f,0.08,'sawtooth',0.05); }, idx*60);
    });
  }
};

/* =========================================================
  2. num grid(1~45 chip) 생성
========================================================= */
function numGridCreate(){
  var grid = document.getElementById('num-grid');
  var html = '';
  for(var num = 1; num <= 45; num++){
    var colorClass = chipColors[num % chipColors.length];
    html += '<button type="button" class="chip '+colorClass+'" data-num="'+num+'">'
          + '<span class="chipnum">'+num+'</span>'
          + '</button>';
  }
  grid.innerHTML = html;

  // 각 칩 버튼에 이벤트 연결
  var chipButtons = grid.querySelectorAll('.chip');
  chipButtons.forEach(function(button){
    // 클릭 = 선택/해제 토글
    button.addEventListener('click', function(){ chipClickProcess(button); });
    // 데스크탑 hover 시 살짝 사운드
    button.addEventListener('mouseenter', function(){
      if(!button.classList.contains('selected') && !button.classList.contains('disabled')){
        sound.buttonHover();
      }
    });
  });
}

/* =========================================================
  3. selec slot(상단 미리보기 6칸) 렌더링
========================================================= */
function slotRefresh(){
  var slotArea = document.getElementById('slot');
  var html = '';
  for(var i=0; i<6; i++){
    var value = selectedNumList[i];
    if(value !== undefined){
      // [수정] 클래스명을 CSS에 정의된 ".slot.filled"와 일치시킴 (기존 "is-slot-filled"는 스타일이 전혀 적용되지 않았음)
      html += '<div class="slot filled">'+value+'</div>';
    }else{
      html += '<div class="slot">?</div>';
    }
  }
  slotArea.innerHTML = html;
}

/* =========================================================
  4. chip 클릭 처리 (선택 / 해제)
========================================================= */
function chipClickProcess(button){
  if(drawing) return; // 추첨 중에는 선택 변경 불가

  audioCtxReady();
  var num = parseInt(button.getAttribute('data-num'), 10);
  var alreadySelected = button.classList.contains('selected');

  if(alreadySelected){
    // ---- 번호 해제 ----
    numOffProcess(button, num);
  }else{
    // 6개를 이미 다 골랐다면 더 이상 선택 불가
    if(selectedNumList.length >= 6) return;

    // ---- 번호 선택 ----
    numSelectProcess(button, num);
  }
}

// 번호를 새로 선택했을 때의 처리 (Press → Bounce → Glow → Selected)
function numSelectProcess(button, num){
  // Press 단계: 눌리는 효과를 짧게 준 뒤 선택 애니메이션 시작
  button.classList.add('pressed');
  setTimeout(function(){
    button.classList.remove('pressed');
    button.classList.add('selected');
    sound.chipSelect();
    miniParticleGen(button, 6); // 골드 파티클 살짝
  }, 90);

  selectedNumList.push(num);
  slotRefresh();

  // 6개를 다 채웠다면 다 채워지지 않은 나머지 칩은 비활성화
  if(selectedNumList.length >= 6){
    setTimeout(selectDoneEffect, 450);
  }
}

// 이미 선택된 번호를 다시 눌러 해제할 때의 처리
function numOffProcess(button, num){
  button.classList.remove('selected');
  button.classList.add('turned-off');
  sound.numOff();

  // 배열에서 해당 번호 제거
  var index = selectedNumList.indexOf(num);
  if(index > -1){ selectedNumList.splice(index,1); }
  slotRefresh();

  // 해제 애니메이션 종료 후 클래스 정리
  setTimeout(function(){ button.classList.remove('turned-off'); }, 400);

  // 6개 미만이 되면 배지 숨기고, 비활성화 됐던 칩들도 다시 활성화
  if(selectedNumList.length < 6){
    document.getElementById('done-badge').classList.remove('show');
    document.getElementById('draw-btn').disabled = true;
    document.querySelectorAll('.chip.disabled').forEach(function(chip){
      chip.classList.remove('disabled');
    });
  }
}

/* =========================================================
  5. 6개 선택 완료 연출 (카지노 승리 연출)
========================================================= */
function selectDoneEffect(){
  var grid = document.getElementById('num-grid');
  var badge = document.getElementById('done-badge');

  // 그리드 전체 살짝 흔들기
  grid.classList.add('win-shake');
  setTimeout(function(){ grid.classList.remove('win-shake'); }, 500);

  // 선택되지 않은 나머지 칩들 비활성화 처리
  document.querySelectorAll('.chip:not(.selected)').forEach(function(chip){
    chip.classList.add('disabled');
  });

  // 상단 배지 표시 + Glow
  badge.classList.add('show');

  // 추첨 버튼 활성화
  document.getElementById('draw-btn').disabled = false;

  // 사운드 + 진동(Haptic)
  sound.selectDone();
  if(navigator.vibrate){ navigator.vibrate([40,30,40]); }

  // 선택된 6개 칩에 골드 파티클 뿌리기
  document.querySelectorAll('.chip.selected').forEach(function(chip){
    miniParticleGen(chip, 5);
  });
}

/* =========================================================
  6. particle 효과 (골드 스파클)
  [수정] 함수 정의 바로 위에 "ref-el" 이라는 코드 조각이 홀로 남아있어
  (뺄셈 표현식으로 해석되어) ReferenceError가 발생, 그 아래 모든 코드가
  실행되지 않던 문제를 삭제하여 해결했습니다.
========================================================= */
function miniParticleGen(refEl, count){
  var position = refEl.getBoundingClientRect();
  for(var i=0; i<count; i++){
    var particle = document.createElement('div');
    particle.className='particle';
    var deg = Math.random()*Math.PI*2;
    var dist = 20 + Math.random()*24;
    var dx = Math.cos(deg)*dist;
    var dy = Math.sin(deg)*dist;
    particle.style.setProperty('--delta', 'translate('+dx+'px,'+dy+'px)');
    particle.style.left = (position.left + position.width/2) + 'px';
    particle.style.top = (position.top + position.height/2) + 'px';
    particle.style.position='fixed';
    document.body.appendChild(particle);
    (function(element){
      setTimeout(function(){ element.remove(); }, 900);
    })(particle);
  }
}

/* =========================================================
  7. 추첨(DRAW LOTTO) button 처리 + roulette 애니메이션
========================================================= */
document.addEventListener('DOMContentLoaded', function(){
  numGridCreate();
  slotRefresh();

  document.getElementById('draw-btn').addEventListener('click', drawBtnClick);
  document.getElementById('reset-btn').addEventListener('click', resetBtnClick);
});

function drawBtnClick(){
  if(drawing) return;
  if(selectedNumList.length !== 6) return;

  drawing = true;
  var button = document.getElementById('draw-btn');

  // 버튼 눌림 + 회전 대기 효과
  button.classList.add('is-pressed');
  sound.drawStart();
  setTimeout(function(){
    button.classList.remove('is-pressed');
    button.classList.add('is-rotating');
    button.disabled = true;
  }, 150);

  // 룰렛 트랙 채우기(1~45 랜덤 순서 반복) 후 회전 애니메이션 시작
  rouletteTrackFill();
  document.getElementById('roulette-area').classList.add('show');

  var line = document.getElementById('roulette-line');
  line.style.animationDuration = '.35s'; // Fast

  // 결과/비교 영역 숨기기(재추첨 대비)
  document.getElementById('result-area').classList.remove('show');

  // 실제 당첨번호 추첨 요청
  //  - Apps Script 서버 환경이면 google.script.run으로 서버 함수 호출
  //  - 로컬 테스트(HTML만 여는 경우) 등 google 객체가 없으면 클라이언트에서 대신 추첨
  // [수정] 서버(Code.gs)에 정의된 함수 이름은 "로또번호추첨하기" 인데
  // 기존 코드는 존재하지 않는 "lottonumdraw"를 호출해 항상 실패 핸들러로 빠졌습니다.
  if(window.google && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(function(winNums){ drawFxPlaying(winNums); })
      .withFailureHandler(function(){ drawFxPlaying(clientDraw()); })
      .로또번호추첨하기();
  }else{
    // 서버 없이 미리보기 중일 때를 위한 대체 로직
    setTimeout(function(){ drawFxPlaying(clientDraw()); }, 300);
  }
}

// google.script.run을 사용할 수 없는 환경을 위한 대체용 클라이언트 추첨 함수
function clientDraw(){
  var total = [];
  for(var i=1;i<=45;i++){ total.push(i); }
  for(var j=total.length-1; j>0; j--){
    var r = Math.floor(Math.random()*(j+1));
    var tmp = total[j]; total[j]=total[r]; total[r]=tmp;
  }
  return total.slice(0,6).sort(function(a,b){return a-b;});
}

// 룰렛 트랙에 보여줄 랜덤 칩들을 채워넣기 (시각 효과용, 실제 결과와는 무관)
function rouletteTrackFill(){
  var line = document.getElementById('roulette-line');
  var html = '';
  for(var i=0;i<30;i++){
    var randomNum = Math.floor(Math.random()*45)+1;
    var color = chipColors[randomNum % chipColors.length];
    html += '<div class="roulettechip '+color+'">'+randomNum+'</div>';
  }
  line.innerHTML = html + html; // 반복 연결(무한 스크롤처럼 보이게)
}

// 서버(or 대체함수)로부터 당첨번호를 받은 뒤 애니메이션 진행 (Fast→Medium→Slow→Stop)
function drawFxPlaying(winNums){
  var line = document.getElementById('roulette-line');

  // Medium 단계
  setTimeout(function(){ line.style.animationDuration = '.7s'; }, 700);
  // Slow 단계
  setTimeout(function(){
    line.classList.add('decel');
    line.style.animationDuration = '1.1s';
  }, 1500);
  // Stop 단계 + 당첨번호 등장 시작
  setTimeout(function(){
    line.style.animation = 'none';
    document.getElementById('draw-btn').classList.remove('is-rotating');
    winNumsShow(winNums);
  }, 2700);
}

/* =========================================================
  8. 당첨번호 등장 (하나씩 POP)
========================================================= */
function winNumsShow(winNums){
  var resultArea = document.getElementById('result-area');
  var winLine = document.getElementById('win-num-line');
  resultArea.classList.add('show');
  winLine.innerHTML = '';

  winNums.forEach(function(num, idx){
    setTimeout(function(){
      var chip = document.createElement('div');
      chip.className = 'winchip';
      chip.textContent = num;
      winLine.appendChild(chip);
      // 다음 프레임에 show 클래스를 붙여야 애니메이션이 확실히 재생됨
      requestAnimationFrame(function(){ chip.classList.add('show'); });

      sound.numShow();
      if(navigator.vibrate){ navigator.vibrate(20); }

      // 마지막 번호가 등장한 뒤 결과 비교 + 잭팟 연출
      if(idx === winNums.length - 1){
        setTimeout(function(){ compareResultsShow(winNums); }, 500);
      }
    }, idx * 350);
  });
}

/* =========================================================
  9. 결과 비교 (내 번호 vs 당첨번호)
========================================================= */
function compareResultsShow(winNums){
  var compareLine = document.getElementById('my-num-line');
  var matchCount = 0;
  compareLine.innerHTML = '';

  // 내가 고른 번호를 오름차순으로 정렬해서 보여주기
  var sortedMyNums = selectedNumList.slice().sort(function(a,b){return a-b;});

  sortedMyNums.forEach(function(num){
    var isHit = winNums.indexOf(num) > -1;
    if(isHit) matchCount++;

    var chip = document.createElement('div');
    chip.className = 'comparechip ' + (isHit ? 'match' : 'fail');
    chip.textContent = num;
    compareLine.appendChild(chip);
  });

  // 적중 개수에 따른 안내 문구
  var summary = document.getElementById('hit-summary');
  var message = '';
  if(matchCount >= 6) message = '🎉 1등 당첨! 완벽한 일치입니다!';
  else if(matchCount === 5) message = '🥈 5개 적중! 아쉽게 놓쳤어요!';
  else if(matchCount === 4) message = '👏 4개 적중! 훌륭해요!';
  else if(matchCount >= 1) message = '✨ '+matchCount+'개 적중했어요!';
  else message = '다음 기회에 다시 도전해보세요!';
  summary.textContent = message;

  // 3개 이상 맞았을 때는 잭팟 벨소리, 아니면 은은한 쉬머
  if(matchCount >= 3){
    sound.jackpot();
    if(navigator.vibrate){ navigator.vibrate([60,40,60,40,120]); }
  }else{
    sound.shimmer();
  }

  drawing = false; // 추첨 시퀀스 종료 → 다시 선택 가능 상태(리셋 전까지는 그리드는 잠금 유지)
}

/* =========================================================
  10. reset(다시 추첨)
========================================================= */
function resetBtnClick(){
  sound.reset();

  var allChip = document.querySelectorAll('.chip');
  allChip.forEach(function(chip){
    chip.classList.add('is-resetting');
  });

  setTimeout(function(){
    // 상태 초기화
    selectedNumList = [];
    drawing = false;

    // 칩 스타일 전부 원상 복구
    allChip.forEach(function(chip){
      chip.classList.remove('selected','disabled','is-resetting');
    });

    slotRefresh();
    document.getElementById('done-badge').classList.remove('show');
    document.getElementById('draw-btn').disabled = true;

    // 룰렛/결과 영역 숨기기
    document.getElementById('roulette-area').classList.remove('show');
    document.getElementById('result-area').classList.remove('show');
    document.getElementById('roulette-line').classList.remove('decel');
    document.getElementById('roulette-line').style.animation = '';
  }, 700);
}

/* =========================================================
  11. 오프닝 로고 자동 제거 (약 1.6초 뒤 서서히 사라짐)
========================================================= */
window.addEventListener('load', function(){
  setTimeout(function(){
    var logo = document.getElementById('opening-logo');
    logo.classList.add('fade-out');
  }, 1600);
});
</script>
